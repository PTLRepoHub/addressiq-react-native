name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build · test · examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: npm test
      # Type-check the library itself, not just the examples. This was missing,
      # so `npm run type-check` sat red on main (react-native-webview was a
      # peerDependency only, so tsc could not resolve it).
      - run: npm run type-check
      # Both examples link to the local SDK via `file:../..`; type-check each.
      - run: npm --prefix examples/core install
      - run: npm --prefix examples/core run type-check
      - run: npm --prefix examples/expo install
      - run: npm --prefix examples/expo run type-check
